name: Package
on:
  push: {}
jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26

      - name: Install libraries
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3

      - name: Build DEB
        run: make -C pam_oidc deb
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: "pam_oidc/pam_oidc_*.deb"
      - name: Upload shared object file
        uses: actions/upload-artifact@v4
        with:
          name: lib
          path: pam_oidc/pam_oidc.so
      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            pam_oidc/pam_oidc_*.deb
